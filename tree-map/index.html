<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Tree Care Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map {
height: 100vh;
width: 100%;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// CHANGE THESE TO MATCH YOUR IMAGE SIZE
var width = 1397;
var height = 1045;

var bounds = [[0,0],[height,width]];

var map = L.map('map', {
crs: L.CRS.Simple,
minZoom: -1
});

var image = L.imageOverlay('wpa-map.png', bounds).addTo(map);

map.fitBounds(bounds);

// --------------------------------
// CLICK MAP TO SEE COORDINATES
// --------------------------------

var popup = L.popup();

function onMapClick(e) {
popup
.setLatLng(e.latlng)
.setContent("Coordinates: [" + Math.round(e.latlng.lat) + ", " + Math.round(e.latlng.lng) + "]")
.openOn(map);
}

map.on('click', onMapClick);

// --------------------------------
// TREE MARKERS
// --------------------------------

L.marker([44,818]).addTo(map)
.bindPopup("<b>Tree1</b><br><img src='images/tree01.jpg' width='200'>");
